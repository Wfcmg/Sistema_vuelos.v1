openapi: 3.0.3
info:
  title: William Carrion Booking API
  version: 1.1.0
  description: Contrato publico para que Booking consulte aeropuertos, vuelos, asientos ocupados, cree reservas, cancele reservas y asigne asientos desde el modulo de vuelos de William Carrion. Las rutas de este contrato son publicas y no requieren JWT.
servers:
  - url: https://vuelos-api-gateway-wc.onrender.com/api/v1/william-carrion-booking
    description: API Gateway publico desplegado en Render
security: []

tags:
  - name: Booking Public
    description: Endpoints publicos para integracion con Booking

paths:
  /:
    get:
      tags:
        - Booking Public
      operationId: getBookingApiStatus
      summary: Estado de la API publica de Booking
      description: Devuelve informacion general de la API publica de vuelos para Booking.
      security: []
      responses:
        '200':
          description: API publica disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusResponse'

  /airports:
    get:
      tags:
        - Booking Public
      operationId: listBookingAirports
      summary: Listar aeropuertos disponibles para Booking
      description: Devuelve los aeropuertos disponibles con codigo IATA, ciudad, pais y zona horaria.
      security: []
      responses:
        '200':
          description: Lista de aeropuertos disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirportsResponse'
              example:
                success: true
                owner: William Carrion
                api: William Carrion Booking API
                version: v1
                module: booking
                visibility: public
                auth: none
                data:
                  - id: apt-uio
                    iataCode: UIO
                    name: Aeropuerto Internacional Mariscal Sucre
                    city: Quito
                    country: Ecuador
                    timezone: America/Guayaquil

  /flights:
    get:
      tags:
        - Booking Public
      operationId: listBookingFlights
      summary: Listar todos los vuelos disponibles para Booking
      description: Devuelve todos los vuelos disponibles con clases, precios, ruta y datos principales.
      security: []
      responses:
        '200':
          description: Lista de vuelos disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightsSearchResponse'
              example:
                success: true
                owner: William Carrion
                api: William Carrion Booking API
                version: v1
                module: booking
                visibility: public
                auth: none
                data:
                  - flightId: flight-uio-lim-scl-001
                    flightNumber: AV100-1
                    origin: UIO
                    destination: SCL
                    departureDate: 2026-07-15T10:00:00.000Z
                    departureDateTime: 2026-07-15T10:00:00.000Z
                    arrivalDateTime: 2026-07-15T17:00:00.000Z
                    status: SCHEDULED
                    duration: 420
                    stops: 1
                    lowestPrice: 250
                    airline: Avianca Demo
                    aircraft: Airbus A320 Demo
                    classes:
                      - flightClassId: fc-economy-001
                        cabinClass: ECONOMY
                        availableSeats: 117
                        basePrice: 250

  /flights/search:
    get:
      tags:
        - Booking Public
      operationId: searchBookingFlights
      summary: Buscar vuelos disponibles para Booking
      description: Busca vuelos por origen, destino, fecha, pasajeros y clase opcional.
      security: []
      parameters:
        - name: origin
          in: query
          required: true
          description: Codigo IATA del aeropuerto de origen.
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: UIO
        - name: destination
          in: query
          required: true
          description: Codigo IATA del aeropuerto de destino.
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: SCL
        - name: date
          in: query
          required: true
          description: Fecha de salida en formato YYYY-MM-DD.
          schema:
            type: string
            format: date
            example: 2026-07-15
        - name: passengers
          in: query
          required: true
          description: Cantidad de pasajeros solicitados.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: class
          in: query
          required: false
          description: Clase de cabina opcional.
          schema:
            type: string
            enum:
              - ECONOMY
              - BUSINESS
              - FIRST
            example: ECONOMY
      responses:
        '200':
          description: Vuelos encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightsSearchResponse'
        '400':
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al consultar el servicio de vuelos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /flights/{flightId}:
    get:
      tags:
        - Booking Public
      operationId: getBookingFlightDetail
      summary: Obtener detalle de un vuelo
      description: Devuelve informacion detallada de un vuelo especifico, incluyendo tramos, ruta y clases disponibles.
      security: []
      parameters:
        - name: flightId
          in: path
          required: true
          description: Identificador unico del vuelo.
          schema:
            type: string
            example: flight-uio-lim-scl-001
      responses:
        '200':
          description: Detalle del vuelo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightDetailResponse'
        '404':
          description: Vuelo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al consultar el detalle del vuelo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /flight-classes/{flightClassId}/occupied-seats:
    get:
      tags:
        - Booking Public
      operationId: getBookingOccupiedSeats
      summary: Consultar asientos ocupados por clase de vuelo
      description: Devuelve los asientos ocupados de una clase de vuelo. No requiere token.
      security: []
      parameters:
        - name: flightClassId
          in: path
          required: true
          description: Identificador de la clase de vuelo.
          schema:
            type: string
            example: fc-economy-001
      responses:
        '200':
          description: Asientos ocupados obtenidos correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccupiedSeatsResponse'
              example:
                success: true
                owner: William Carrion
                api: William Carrion Booking API
                version: v1
                module: booking
                visibility: public
                auth: none
                feature: occupied-seats
                data:
                  - 12A
        '502':
          description: Error al consultar asientos ocupados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservations:
    post:
      tags:
        - Booking Public
      operationId: createBookingReservation
      summary: Crear una reserva publica para Booking
      description: Crea una reserva con pasajeros y asiento seleccionado. No requiere JWT. El campo userId se envia en el body para identificar al usuario.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
            example:
              userId: usr-test-william-001
              flightClassId: fc-economy-001
              passengers:
                - firstName: Booking
                  lastName: Publico
                  documentNumber: DOC123456
                  seatNumber: 14A
      responses:
        '201':
          description: Reserva creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          description: Datos invalidos o userId faltante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Asiento ocupado o conflicto de reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al crear reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservations/{reservationId}/cancel:
    patch:
      tags:
        - Booking Public
      operationId: cancelBookingReservation
      summary: Cancelar una reserva publica para Booking
      description: Cancela una reserva existente. No requiere JWT. El campo userId se envia en el body para validar la reserva del usuario.
      security: []
      parameters:
        - name: reservationId
          in: path
          required: true
          description: Identificador unico de la reserva.
          schema:
            type: string
            example: cmplvi7s0002qogl28a6i157
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelReservationRequest'
            example:
              userId: usr-test-william-001
      responses:
        '200':
          description: Reserva cancelada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelReservationResponse'
        '400':
          description: Datos invalidos o userId faltante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al cancelar reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservations/{reservationId}/passengers/{passengerId}/seat:
    patch:
      tags:
        - Booking Public
      operationId: setBookingReservationSeat
      summary: Asignar asiento a un pasajero de una reserva
      description: Asigna o actualiza el asiento de un pasajero dentro de una reserva. No requiere JWT. El campo userId se envia en el body para validar la reserva del usuario.
      security: []
      parameters:
        - name: reservationId
          in: path
          required: true
          description: Identificador unico de la reserva.
          schema:
            type: string
            example: cmplvi7s0002qogl28a6i157
        - name: passengerId
          in: path
          required: true
          description: Identificador unico del pasajero de la reserva.
          schema:
            type: string
            example: cmplvi7s0003qoglxon5zto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetSeatRequest'
            example:
              userId: usr-test-william-001
              seatNumber: 15A
      responses:
        '200':
          description: Asiento asignado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetSeatResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El asiento ya esta ocupado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al asignar asiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ApiStatusResponse:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        project:
          type: string
          example: booking
        route:
          type: string
          example: /api/v1/william-carrion-booking
        aliases:
          type: array
          items:
            type: string
        visibility:
          type: string
          example: public
        message:
          type: string
        gateway:
          type: string
          example: api-gateway
        status:
          type: string
          example: online
        version:
          type: string
          example: 2.0.0

    AirportsResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          type: array
          items:
            $ref: '#/components/schemas/Airport'

    Airport:
      type: object
      required:
        - id
        - iataCode
        - name
      properties:
        id:
          type: string
          example: apt-uio
        iataCode:
          type: string
          example: UIO
        name:
          type: string
          example: Aeropuerto Internacional Mariscal Sucre
        city:
          type: string
          nullable: true
          example: Quito
        country:
          type: string
          nullable: true
          example: Ecuador
        timezone:
          type: string
          nullable: true
          example: America/Guayaquil

    FlightsSearchResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          type: array
          items:
            $ref: '#/components/schemas/FlightSearchItem'

    FlightSearchItem:
      type: object
      properties:
        flightId:
          type: string
          example: flight-uio-lim-scl-001
        flightNumber:
          type: string
          example: AV100-1
        origin:
          type: string
          example: UIO
        destination:
          type: string
          example: SCL
        departureDate:
          type: string
          format: date-time
        departureDateTime:
          type: string
          format: date-time
          nullable: true
        arrivalDateTime:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          example: SCHEDULED
        duration:
          type: integer
          example: 420
        stops:
          type: integer
          example: 1
        lowestPrice:
          type: number
          example: 250
        airline:
          type: string
          nullable: true
          example: Avianca Demo
        aircraft:
          type: string
          nullable: true
          example: Airbus A320 Demo
        route:
          type: object
          nullable: true
          additionalProperties: true
        classes:
          type: array
          items:
            $ref: '#/components/schemas/FlightClass'

    FlightDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          $ref: '#/components/schemas/FlightDetail'

    FlightDetail:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          example: flight-uio-lim-scl-001
        originAirportIata:
          type: string
          example: UIO
        destinationAirportIata:
          type: string
          example: SCL
        departureDate:
          type: string
          format: date-time
        status:
          type: string
          example: SCHEDULED
        duration:
          type: integer
          example: 420
        stops:
          type: integer
          example: 1
        lowestPrice:
          type: number
          example: 250
        flightNumber:
          type: string
          example: AV100-1
        departureDateTime:
          type: string
          format: date-time
          nullable: true
        arrivalDateTime:
          type: string
          format: date-time
          nullable: true
        airline:
          nullable: true
        aircraft:
          nullable: true
        route:
          type: object
          nullable: true
          additionalProperties: true
        segments:
          type: array
          items:
            type: object
            additionalProperties: true
        flightClasses:
          type: array
          items:
            type: object
            additionalProperties: true

    FlightClass:
      type: object
      properties:
        flightClassId:
          type: string
          example: fc-economy-001
        cabinClass:
          type: string
          example: ECONOMY
        availableSeats:
          type: integer
          example: 117
        basePrice:
          type: number
          example: 250

    OccupiedSeatsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        api:
          type: string
          example: William Carrion Booking API
        version:
          type: string
          example: v1
        module:
          type: string
          example: booking
        visibility:
          type: string
          example: public
        auth:
          type: string
          example: none
        feature:
          type: string
          example: occupied-seats
        data:
          type: array
          items:
            type: string
          example:
            - 12A

    CreateReservationRequest:
      type: object
      required:
        - userId
        - flightClassId
        - passengers
      properties:
        userId:
          type: string
          description: Identificador del usuario que realiza la reserva.
          example: usr-test-william-001
        flightClassId:
          type: string
          description: Identificador de la clase de vuelo seleccionada.
          example: fc-economy-001
        promotionCode:
          type: string
          nullable: true
          description: Codigo promocional opcional.
          example: PROMO10
        passengers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateReservationPassenger'

    CreateReservationPassenger:
      type: object
      required:
        - firstName
        - lastName
        - documentNumber
      properties:
        firstName:
          type: string
          example: Booking
        lastName:
          type: string
          example: Publico
        documentNumber:
          type: string
          example: DOC123456
        seatNumber:
          type: string
          nullable: true
          example: 14A

    CancelReservationRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          example: usr-test-william-001

    SetSeatRequest:
      type: object
      required:
        - userId
        - seatNumber
      properties:
        userId:
          type: string
          example: usr-test-william-001
        seatNumber:
          type: string
          example: 15A

    ReservationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        api:
          type: string
          example: William Carrion Booking API
        version:
          type: string
          example: v1
        module:
          type: string
          example: booking
        visibility:
          type: string
          example: public-contract
        auth:
          type: string
          example: none
        feature:
          type: string
          example: create-reservation
        data:
          $ref: '#/components/schemas/Reservation'

    Reservation:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          example: cmplvi7s0002qogl28a6i157
        userId:
          type: string
          example: usr-test-william-001
        flightId:
          type: string
          example: flight-uio-lim-scl-001
        promotionId:
          type: string
          nullable: true
        reservationCode:
          type: string
          example: EDC578E7
        totalAmount:
          type: string
          example: '250'
        status:
          type: string
          example: CONFIRMED
        createdAt:
          type: string
          format: date-time
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/ReservationPassenger'
        promotion:
          nullable: true

    ReservationPassenger:
      type: object
      properties:
        id:
          type: string
          example: cmplvi7s0003qoglxon5zto
        reservationId:
          type: string
          example: cmplvi7s0002qogl28a6i157
        flightClassId:
          type: string
          example: fc-economy-001
        firstName:
          type: string
          example: Booking
        lastName:
          type: string
          example: Publico
        documentNumber:
          type: string
          example: DOC123456
        seatNumber:
          type: string
          nullable: true
          example: 14A

    CancelReservationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        api:
          type: string
          example: William Carrion Booking API
        version:
          type: string
          example: v1
        module:
          type: string
          example: booking
        visibility:
          type: string
          example: public-contract
        auth:
          type: string
          example: none
        feature:
          type: string
          example: cancel-reservation
        data:
          type: object
          properties:
            cancelled:
              type: boolean
              example: true
            reservationCode:
              type: string
              example: EDC578E7

    SetSeatResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        api:
          type: string
          example: William Carrion Booking API
        version:
          type: string
          example: v1
        module:
          type: string
          example: booking
        visibility:
          type: string
          example: public-contract
        auth:
          type: string
          example: none
        feature:
          type: string
          example: set-seat
        data:
          $ref: '#/components/schemas/ReservationPassenger'

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          additionalProperties: true
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
