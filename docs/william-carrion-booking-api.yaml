openapi: 3.0.3
info:
  title: William Carrion Booking API
  version: 1.0.0
  description: Contrato publico para que Booking consulte aeropuertos y vuelos disponibles desde el modulo de vuelos de William Carrion.
servers:
  - url: https://vuelos-api-gateway-wc.onrender.com/api/v1/william-carrion-booking
    description: API Gateway publico desplegado en Render
security: []
tags:
  - name: Booking Public
    description: Endpoints publicos para integracion con Booking

paths:
  /:
    get:
      tags:
        - Booking Public
      operationId: getBookingApiStatus
      summary: Estado de la API publica de Booking
      description: Devuelve informacion general de la API publica de vuelos para Booking.
      security: []
      responses:
        '200':
          description: API publica disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusResponse'
              example:
                success: true
                owner: William Carrion
                project: booking
                route: /api/v1/william-carrion-booking
                visibility: public
                gateway: api-gateway
                status: online
                version: 2.0.0

  /airports:
    get:
      tags:
        - Booking Public
      operationId: listBookingAirports
      summary: Listar aeropuertos disponibles para Booking
      description: Devuelve los aeropuertos disponibles con codigo IATA, ciudad, pais y zona horaria.
      security: []
      responses:
        '200':
          description: Lista de aeropuertos disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirportsResponse'
              example:
                success: true
                owner: William Carrion
                api: William Carrion Booking API
                version: v1
                module: booking
                visibility: public
                auth: none
                data:
                  - id: apt-uio
                    iataCode: UIO
                    name: Aeropuerto Internacional Mariscal Sucre
                    city: Quito
                    country: Ecuador
                    timezone: America/Guayaquil
                  - id: apt-lim
                    iataCode: LIM
                    name: Aeropuerto Internacional Jorge Chavez
                    city: Lima
                    country: Peru
                    timezone: America/Lima
                  - id: apt-scl
                    iataCode: SCL
                    name: Aeropuerto Arturo Merino Benitez
                    city: Santiago
                    country: Chile
                    timezone: America/Santiago

  /flights/search:
    get:
      tags:
        - Booking Public
      operationId: searchBookingFlights
      summary: Buscar vuelos disponibles para Booking
      description: Busca vuelos por origen, destino, fecha, pasajeros y clase opcional.
      security: []
      parameters:
        - name: origin
          in: query
          required: true
          description: Codigo IATA del aeropuerto de origen.
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: UIO
        - name: destination
          in: query
          required: true
          description: Codigo IATA del aeropuerto de destino.
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: SCL
        - name: date
          in: query
          required: true
          description: Fecha de salida en formato YYYY-MM-DD.
          schema:
            type: string
            format: date
            example: 2026-07-15
        - name: passengers
          in: query
          required: true
          description: Cantidad de pasajeros solicitados.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: class
          in: query
          required: false
          description: Clase de cabina opcional.
          schema:
            type: string
            enum:
              - ECONOMY
              - BUSINESS
              - FIRST
            example: ECONOMY
      responses:
        '200':
          description: Vuelos encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightsSearchResponse'
              example:
                success: true
                owner: William Carrion
                api: William Carrion Booking API
                version: v1
                module: booking
                visibility: public
                auth: none
                data:
                  - flightId: flight-uio-lim-scl-001
                    flightNumber: AV100-1
                    origin: UIO
                    destination: SCL
                    departureDate: 2026-07-15T10:00:00.000Z
                    departureDateTime: 2026-07-15T10:00:00.000Z
                    arrivalDateTime: 2026-07-15T17:00:00.000Z
                    status: SCHEDULED
                    duration: 420
                    stops: 1
                    lowestPrice: 250
                    airline: Avianca Demo
                    aircraft: Airbus A320 Demo
                    classes:
                      - flightClassId: fc-economy-001
                        cabinClass: ECONOMY
                        availableSeats: 118
                        basePrice: 250
                      - flightClassId: fc-business-001
                        cabinClass: BUSINESS
                        availableSeats: 20
                        basePrice: 600
        '400':
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al consultar el servicio de vuelos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /flights/{flightId}:
    get:
      tags:
        - Booking Public
      operationId: getBookingFlightDetail
      summary: Obtener detalle de un vuelo
      description: Devuelve informacion detallada de un vuelo especifico, incluyendo tramos, ruta y clases disponibles.
      security: []
      parameters:
        - name: flightId
          in: path
          required: true
          description: Identificador unico del vuelo.
          schema:
            type: string
            example: flight-uio-lim-scl-001
      responses:
        '200':
          description: Detalle del vuelo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightDetailResponse'
        '404':
          description: Vuelo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al consultar el detalle del vuelo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ApiStatusResponse:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
          example: true
        owner:
          type: string
          example: William Carrion
        project:
          type: string
          example: booking
        route:
          type: string
          example: /api/v1/william-carrion-booking
        aliases:
          type: array
          items:
            type: string
        visibility:
          type: string
          example: public
        message:
          type: string
        gateway:
          type: string
          example: api-gateway
        status:
          type: string
          example: online
        version:
          type: string
          example: 2.0.0

    AirportsResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          type: array
          items:
            $ref: '#/components/schemas/Airport'

    Airport:
      type: object
      required:
        - id
        - iataCode
        - name
      properties:
        id:
          type: string
          example: apt-uio
        iataCode:
          type: string
          example: UIO
        name:
          type: string
          example: Aeropuerto Internacional Mariscal Sucre
        city:
          type: string
          nullable: true
          example: Quito
        country:
          type: string
          nullable: true
          example: Ecuador
        timezone:
          type: string
          nullable: true
          example: America/Guayaquil

    FlightsSearchResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          type: array
          items:
            $ref: '#/components/schemas/FlightSearchItem'

    FlightSearchItem:
      type: object
      properties:
        flightId:
          type: string
          example: flight-uio-lim-scl-001
        flightNumber:
          type: string
          example: AV100-1
        origin:
          type: string
          example: UIO
        destination:
          type: string
          example: SCL
        departureDate:
          type: string
          format: date-time
        departureDateTime:
          type: string
          format: date-time
          nullable: true
        arrivalDateTime:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          example: SCHEDULED
        duration:
          type: integer
          example: 420
        stops:
          type: integer
          example: 1
        lowestPrice:
          type: number
          example: 250
        airline:
          type: string
          nullable: true
          example: Avianca Demo
        aircraft:
          type: string
          nullable: true
          example: Airbus A320 Demo
        route:
          nullable: true
          $ref: '#/components/schemas/Route'
        classes:
          type: array
          items:
            $ref: '#/components/schemas/FlightClass'

    FlightDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        owner:
          type: string
        api:
          type: string
        version:
          type: string
        module:
          type: string
        visibility:
          type: string
        auth:
          type: string
          example: none
        data:
          $ref: '#/components/schemas/FlightDetail'

    FlightDetail:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          example: flight-uio-lim-scl-001
        originAirportIata:
          type: string
          example: UIO
        destinationAirportIata:
          type: string
          example: SCL
        departureDate:
          type: string
          format: date-time
        status:
          type: string
          example: SCHEDULED
        duration:
          type: integer
          example: 420
        stops:
          type: integer
          example: 1
        lowestPrice:
          type: number
          example: 250
        flightNumber:
          type: string
          example: AV100-1
        departureDateTime:
          type: string
          format: date-time
          nullable: true
        arrivalDateTime:
          type: string
          format: date-time
          nullable: true
        airline:
          nullable: true
        aircraft:
          nullable: true
        route:
          nullable: true
          $ref: '#/components/schemas/Route'
        segments:
          type: array
          items:
            type: object
            additionalProperties: true
        flightClasses:
          type: array
          items:
            type: object
            additionalProperties: true

    Route:
      type: object
      additionalProperties: true
      properties:
        estimatedDuration:
          type: integer
          example: 420
        originAirport:
          $ref: '#/components/schemas/RouteAirport'
        destinationAirport:
          $ref: '#/components/schemas/RouteAirport'

    RouteAirport:
      type: object
      properties:
        id:
          type: string
          nullable: true
        iataCode:
          type: string
        name:
          type: string
        city:
          type: string
        country:
          type: string
        timezone:
          type: string

    FlightClass:
      type: object
      properties:
        flightClassId:
          type: string
          example: fc-economy-001
        cabinClass:
          type: string
          example: ECONOMY
        availableSeats:
          type: integer
          example: 118
        basePrice:
          type: number
          example: 250

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          additionalProperties: true
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
